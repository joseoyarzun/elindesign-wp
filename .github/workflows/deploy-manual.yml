name: Deploy WP Code (Manual)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
      ref:
        description: "Branch, tag, or commit to deploy (default: main)"
        required: true
        default: "main"
        type: string
      dry_run:
        description: "Run rsync in dry-run mode"
        required: true
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ inputs.target == 'dev' && secrets.DEPLOY_DEV_HOST || secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ inputs.target == 'dev' && secrets.DEPLOY_DEV_PORT || secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ inputs.target == 'dev' && secrets.DEPLOY_DEV_USER || secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ inputs.target == 'dev' && secrets.DEPLOY_DEV_PATH || secrets.DEPLOY_PATH }}
      DEPLOY_SSH_KEY: ${{ inputs.target == 'dev' && secrets.DEPLOY_DEV_SSH_KEY || secrets.DEPLOY_SSH_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Validate deployment rules
        shell: bash
        run: |
          echo "Deploy trigger branch: ${{ github.ref_name }}"
          echo "Deploy target: ${{ inputs.target }}"
          echo "Deploy ref: ${{ inputs.ref }}"

          if [[ "${{ inputs.target }}" == "prod" && "${{ inputs.ref }}" != "main" ]]; then
            echo "Production deployments are allowed only with ref=main"
            exit 1
          fi

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${DEPLOY_HOST}" || (echo "Missing deploy host secret for target=${{ inputs.target }}" && exit 1)
          test -n "${DEPLOY_USER}" || (echo "Missing deploy user secret for target=${{ inputs.target }}" && exit 1)
          test -n "${DEPLOY_PATH}" || (echo "Missing deploy path secret for target=${{ inputs.target }}" && exit 1)
          test -n "${DEPLOY_SSH_KEY}" || (echo "Missing deploy SSH key secret for target=${{ inputs.target }}" && exit 1)

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${DEPLOY_SSH_KEY}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          PORT="${DEPLOY_PORT:-22}"
          ssh-keyscan -p "${PORT}" "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync full WordPress mirror to server
        shell: bash
        run: |
          set -euo pipefail
          PORT="${DEPLOY_PORT:-22}"
          HOST="${DEPLOY_HOST}"
          USER="${DEPLOY_USER}"
          REMOTE_PATH="${DEPLOY_PATH}"

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            DRY='--dry-run'
          else
            DRY=''
          fi

          RSYNC_SSH="ssh -p ${PORT}"
          RSYNC_FLAGS="-az --delete --omit-dir-times --no-perms --no-owner --no-group"

          rsync ${RSYNC_FLAGS} ${DRY} \
            --exclude-from='.github/deploy-excludes.txt' \
            -e "${RSYNC_SSH}" \
            ./ "${USER}@${HOST}:${REMOTE_PATH}/"

      - name: Post-deploy cache cleanup (optional)
        if: ${{ inputs.dry_run == false }}
        shell: bash
        run: |
          PORT="${DEPLOY_PORT:-22}"
          HOST="${DEPLOY_HOST}"
          USER="${DEPLOY_USER}"
          REMOTE_PATH="${DEPLOY_PATH}"
          ssh -p "${PORT}" "${USER}@${HOST}" "rm -rf ${REMOTE_PATH}/wp-content/cache/* || true"
